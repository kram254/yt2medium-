<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Zero2Medium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #000000;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.18) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.18) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.12) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(147, 51, 234, 0.12) 0px, transparent 50%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.09);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.25s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.6);
            outline: none;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
        }
        ::placeholder { color: rgba(255,255,255,0.35); }
        .glow-btn {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.25);
            transition: box-shadow 0.25s ease, transform 0.15s ease;
        }
        .glow-btn:hover {
            box-shadow: 0 0 32px rgba(255,255,255,0.45);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white p-4">

    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center space-x-3 mb-3">
                <div class="w-9 h-9 rounded-xl glass flex items-center justify-center font-bold text-sm">AI</div>
                <span class="text-xl font-semibold tracking-tight">Zero2Medium</span>
            </div>
            <p class="text-neutral-400 text-sm">Reset your password</p>
        </div>

        <!-- Card -->
        <div class="glass rounded-2xl p-7">

            {% if message %}
            <div class="mb-5 rounded-xl px-4 py-3 text-sm text-green-300" style="background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2);">
                <div class="flex items-start space-x-2">
                    <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span>{{ message }}</span>
                </div>
            </div>
            {% else %}

            <p class="text-sm text-neutral-400 mb-5 leading-relaxed">
                Enter your email and we'll send you a link to reset your password.
            </p>

            <form method="POST" action="/forgot-password" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-neutral-400 mb-1.5">Email</label>
                    <input type="email" name="email" required autocomplete="email"
                        class="glass-input w-full px-4 py-3 rounded-xl text-sm"
                        placeholder="you@example.com">
                </div>
                <button type="submit" class="glow-btn w-full py-3 px-4 rounded-xl text-sm font-semibold">
                    Send Reset Link
                </button>
            </form>

            {% endif %}
        </div>

        <!-- Footer link -->
        <p class="text-center text-sm text-neutral-500 mt-5">
            Remember your password?
            <a href="/login" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Sign in</a>
        </p>
    </div>

</body>
</html>
