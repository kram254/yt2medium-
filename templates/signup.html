<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Zero2Medium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #000000;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.18) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.18) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.12) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(147, 51, 234, 0.12) 0px, transparent 50%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.09);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.25s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.6);
            outline: none;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
        }
        ::placeholder { color: rgba(255,255,255,0.35); }
        .glow-btn {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.25);
            transition: box-shadow 0.25s ease, transform 0.15s ease;
        }
        .glow-btn:hover {
            box-shadow: 0 0 32px rgba(255,255,255,0.45);
            transform: translateY(-1px);
        }
        .google-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            transition: all 0.25s ease;
        }
        .google-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.22);
        }
        .divider { position: relative; }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span {
            position: relative;
            background: transparent;
            padding: 0 12px;
            font-size: 12px;
            color: rgba(255,255,255,0.35);
        }
        .strength-bar { height: 3px; border-radius: 2px; transition: width 0.3s ease; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white p-4">

    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center space-x-3 mb-3">
                <div class="w-9 h-9 rounded-xl glass flex items-center justify-center font-bold text-sm">AI</div>
                <span class="text-xl font-semibold tracking-tight">Zero2Medium</span>
            </div>
            <p class="text-neutral-400 text-sm">Create your account</p>
        </div>

        <!-- Card -->
        <div class="glass rounded-2xl p-7">

            {% if error %}
            <div class="mb-5 rounded-xl px-4 py-3 text-sm text-red-300" style="background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2);">
                {{ error }}
            </div>
            {% endif %}

            <!-- Google Sign-Up -->
            <a href="/auth/google{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" class="google-btn w-full flex items-center justify-center space-x-3 rounded-xl py-3 px-4 text-sm font-medium text-neutral-200 mb-5 cursor-pointer">
                <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Continue with Google</span>
            </a>

            <div class="divider text-center mb-5">
                <span>or sign up with email</span>
            </div>

            <!-- Email/Password Form -->
            <form method="POST" action="/signup" class="space-y-4" id="signupForm">
                <div>
                    <label class="block text-xs font-medium text-neutral-400 mb-1.5">Email</label>
                    <input type="email" name="email" required autocomplete="email"
                        class="glass-input w-full px-4 py-3 rounded-xl text-sm"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-xs font-medium text-neutral-400 mb-1.5">Password</label>
                    <input type="password" name="password" id="passwordInput" required autocomplete="new-password"
                        class="glass-input w-full px-4 py-3 rounded-xl text-sm"
                        placeholder="Min. 8 characters" minlength="8" oninput="checkStrength(this.value)">
                    <!-- Strength indicator -->
                    <div class="mt-2 flex space-x-1">
                        <div class="flex-1 bg-white/10 rounded-full h-0.5"><div id="s1" class="strength-bar bg-transparent w-0"></div></div>
                        <div class="flex-1 bg-white/10 rounded-full h-0.5"><div id="s2" class="strength-bar bg-transparent w-0"></div></div>
                        <div class="flex-1 bg-white/10 rounded-full h-0.5"><div id="s3" class="strength-bar bg-transparent w-0"></div></div>
                        <div class="flex-1 bg-white/10 rounded-full h-0.5"><div id="s4" class="strength-bar bg-transparent w-0"></div></div>
                    </div>
                    <p id="strengthLabel" class="text-xs text-neutral-500 mt-1"></p>
                </div>
                <div>
                    <label class="block text-xs font-medium text-neutral-400 mb-1.5">Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirmInput" required autocomplete="new-password"
                        class="glass-input w-full px-4 py-3 rounded-xl text-sm"
                        placeholder="••••••••">
                    <p id="matchMsg" class="text-xs mt-1 hidden"></p>
                </div>
                <button type="submit" class="glow-btn w-full py-3 px-4 rounded-xl text-sm font-semibold mt-1">
                    Create Account
                </button>
            </form>

            <p class="text-center text-xs text-neutral-500 mt-4">
                By signing up you agree to our Terms of Service
            </p>
        </div>

        <!-- Footer link -->
        <p class="text-center text-sm text-neutral-500 mt-5">
            Already have an account?
            <a href="/login" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Sign in</a>
        </p>
    </div>

    <script>
        function checkStrength(val) {
            const bars = ['s1','s2','s3','s4'];
            const label = document.getElementById('strengthLabel');
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
            const labels = ['Weak','Fair','Good','Strong'];
            bars.forEach((id, i) => {
                const el = document.getElementById(id);
                el.style.width = i < score ? '100%' : '0';
                el.style.background = i < score ? colors[score-1] : 'transparent';
            });
            label.textContent = val.length ? labels[score-1] || '' : '';
            label.style.color = val.length ? colors[score-1] : '';
        }

        document.getElementById('confirmInput').addEventListener('input', function() {
            const pw = document.getElementById('passwordInput').value;
            const msg = document.getElementById('matchMsg');
            if (!this.value) { msg.classList.add('hidden'); return; }
            msg.classList.remove('hidden');
            if (this.value === pw) {
                msg.textContent = 'Passwords match';
                msg.style.color = '#22c55e';
            } else {
                msg.textContent = 'Passwords do not match';
                msg.style.color = '#ef4444';
            }
        });

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            const pw = document.getElementById('passwordInput').value;
            const confirm = document.getElementById('confirmInput').value;
            if (pw !== confirm) {
                e.preventDefault();
                alert('Passwords do not match.');
            }
        });
    </script>
</body>
</html>
